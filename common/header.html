<header class="header">
    <div class="contenedor header-contenido">
        <!-- Logo y título - Enlace al index -->
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">El canal oficial donde los vecinos sí ven las cosas</p>
            </div>
        </a>

        <!-- Acciones del usuario -->
        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">
                <span class="btn-icon">🔐</span>
                <span>Iniciar sesión</span>
            </a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">
                <span class="btn-icon">🚪</span>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </div>
</header>

<style>
/* Header - logo y h1 uno al lado del otro */
.header-logo {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
}

.logo-icon {
    font-size: 3rem;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    flex-shrink: 0;
}

.logo-texto {
    display: flex;
    flex-direction: column;
}

.logo-texto h1 {
    margin: 0;
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
}

.header-slogan {
    margin: 5px 0 0;
    font-size: 0.85rem;
    color: #b0b0b0;
    font-style: italic;
    white-space: nowrap;
}

.header-logo:hover h1 {
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.btn-login, .btn-logout {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: linear-gradient(135deg, #f5b042, #ff8c42);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: 600;
    font-size: 0.9rem;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-logout {
    background: linear-gradient(135deg, #dc3545, #c82333);
}

/* Hover corregido - sin filter brightness que causa el problema */
.btn-login:hover {
    background: linear-gradient(135deg, #e69a2e, #e67300);
    transform: scale(1.02);
}

.btn-logout:hover {
    background: linear-gradient(135deg, #c82333, #a71d2a);
    transform: scale(1.02);
}

/* Responsive */
@media (max-width: 768px) {
    .logo-texto h1 {
        font-size: 1.2rem;
        white-space: normal;
    }
    .header-slogan {
        font-size: 0.7rem;
        white-space: normal;
    }
    .logo-icon {
        width: 45px;
        height: 45px;
        font-size: 2rem;
    }
}
</style>

<script>
    // Script para manejar el estado de sesión en el header
    document.addEventListener('DOMContentLoaded', function() {
        const usuario = API?.getUsuarioActual ? API.getUsuarioActual() : null;
        const loginLink = document.getElementById('login-link');
        const cerrarSesion = document.getElementById('cerrar-sesion');
        
        if (usuario && loginLink && cerrarSesion) {
            loginLink.style.display = 'none';
            cerrarSesion.style.display = 'inline-flex';
            
            cerrarSesion.addEventListener('click', function(e) {
                e.preventDefault();
                if (API && API.cerrarSesion) {
                    API.cerrarSesion();
                }
                window.location.href = '/avisos-jardines/login.html';
            });
        } else if (loginLink && cerrarSesion) {
            loginLink.style.display = 'inline-flex';
            cerrarSesion.style.display = 'none';
        }
    });
</script>
