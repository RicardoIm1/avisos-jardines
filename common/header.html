<header class="header">
    <div class="contenedor header-contenido">
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">El canal oficial donde los vecinos sí ven las cosas</p>
            </div>
        </a>
        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">
                <span class="btn-icon">🔐</span>
                <span>Iniciar sesión</span>
            </a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">
                <span class="btn-icon">🚪</span>
                <span>Cerrar sesión</span>
            </a>
        </div>
    </div>
</header>

<style>
    /* RESET completo */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
    }

    .header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        margin: 0;
        border: 0;
        box-shadow: none;
    }

    .header-contenido {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .header-logo {
        display: flex;
        align-items: center;
        gap: 15px;
        text-decoration: none;
    }

    .logo-icon {
        font-size: 3rem;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        border-radius: 50%;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo-texto h1 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff, #f5b042);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .header-slogan {
        margin: 5px 0 0;
        font-size: 0.85rem;
        color: #b0b0b0;
        font-style: italic;
    }

    .header-acciones {
        display: flex;
        gap: 12px;
    }

    .btn-login, .btn-logout {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: linear-gradient(135deg, #f5b042, #ff8c42);
        color: white;
        text-decoration: none;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.9rem;
    }

    .btn-logout {
        background: linear-gradient(135deg, #dc3545, #c82333);
    }

    @media (max-width: 768px) {
        .header {
            padding: 15px 0;
        }
        .header-contenido {
            flex-direction: column;
            text-align: center;
        }
        .header-logo {
            flex-direction: column;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            font-size: 2.5rem;
        }
        .logo-texto h1 {
            font-size: 1.4rem;
        }
        .btn-login, .btn-logout {
            padding: 8px 16px;
        }
    }

    @media (max-width: 480px) {
        .logo-texto h1 {
            font-size: 1.2rem;
        }
        .btn-login span, .btn-logout span {
            display: none;
        }
        .btn-login, .btn-logout {
            padding: 10px 12px;
        }
    }
</style>
