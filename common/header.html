<header class="header">
    <div class="contenedor header-contenido">
        <a href="/avisos-jardines/index.html" class="header-logo">
            <div class="logo-icon">🏘️</div>
            <div class="logo-texto">
                <h1>Avisos Colonia Jardines PVR</h1>
                <p class="header-slogan">Lo que pasa en la colonia, aquí se sabe</p>
            </div>
        </a>

        <div id="reputacion-widget" style="display: none; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 40px; margin-right: 15px;">
            <div>⭐ <span id="puntos-valor">0</span></div>
            <div>🏆 <span id="nivel-valor">cargando</span></div>
            <div>📊 <span id="avisos-restantes">-</span>/<span id="avisos-limite">-</span></div>
            <div style="width: 60px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden;">
                <div id="reputacion-barra" style="width:0%; height:100%; background:#fbbf24;"></div>
            </div>
            <button id="btn-ver-reputacion" style="background:none; border:none; color:white; cursor:pointer;">📊</button>
        </div>

        <div class="header-acciones" id="header-acciones">
            <a href="/avisos-jardines/login.html" id="login-link" class="btn-login">🔐 Iniciar sesión</a>
            <a href="#" id="admin-link" class="btn-admin" style="display:none;">⚙️ Administrador</a>
            <a href="#" id="cerrar-sesion" class="btn-logout" style="display:none;">🚪 Cerrar sesión</a>
        </div>
    </div>
</header>

<style>
    /* Tus estilos aquí */
    .header-logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
    .logo-icon { font-size: 3rem; background: linear-gradient(135deg, #2b7a2b, #1e4620); border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; }
    .logo-texto h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #2b7a2b, #d4a043); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-login { background: linear-gradient(135deg, #f5b042, #ff8c42); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; }
    .btn-admin { background: linear-gradient(135deg, #d4a043, #b8860b); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; }
    .btn-logout { border: 2px solid #d4a043; color: #d4a043; padding: 10px 20px; border-radius: 30px; text-decoration: none; background: transparent; }
    .header-acciones { display: flex; gap: 12px; align-items: center; }
</style>

<script>
    (function() {
        function cerrarSesion() {
            localStorage.removeItem('usuario');
            localStorage.removeItem('api_key');
            window.location.href = '/avisos-jardines/login.html';
        }
        
        function actualizarBotones() {
            const usuarioStr = localStorage.getItem('usuario');
            const apiKey = localStorage.getItem('api_key');
            
            const loginLink = document.getElementById('login-link');
            const adminLink = document.getElementById('admin-link');
            let cerrarBtn = document.getElementById('cerrar-sesion');
            
            if (!loginLink) return;
            
            if (usuarioStr && apiKey) {
                try {
                    const usuario = JSON.parse(usuarioStr);
                    loginLink.style.display = 'none';
                    
                    if (cerrarBtn) {
                        cerrarBtn.style.display = 'inline-flex';
                        // Clonar para eliminar eventos anteriores
                        const newBtn = cerrarBtn.cloneNode(true);
                        cerrarBtn.parentNode.replaceChild(newBtn, cerrarBtn);
                        cerrarBtn = newBtn;
                        cerrarBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            e.stopPropagation();
                            cerrarSesion();
                        });
                    }
                    
                    if (usuario.rol === 'admin') {
                        adminLink.style.display = 'inline-flex';
                        adminLink.onclick = function(e) {
                            e.preventDefault();
                            window.location.href = '/avisos-jardines/admin.html';
                        };
                    } else {
                        adminLink.style.display = 'none';
                    }
                } catch(e) {}
            } else {
                loginLink.style.display = 'inline-flex';
                adminLink.style.display = 'none';
                if (cerrarBtn) cerrarBtn.style.display = 'none';
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', actualizarBotones);
        } else {
            actualizarBotones();
        }
        
        window.addEventListener('storage', actualizarBotones);
    })();
</script>
