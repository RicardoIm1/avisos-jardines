<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">

  <!-- Estilos adicionales formato periódico digital -->
  <style>
    /* ========== ESTILO PERIÓDICO DIGITAL / SITIO DE NOTICIAS ========== */
    body {
      background: #f5f5f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Contenedor principal estilo artículo */
    .contenedor-chico {
      max-width: 880px;
      margin: 30px auto;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    /* Contenido del aviso */
    #aviso-detalle {
      padding: 0 35px 40px;
    }

    /* Categoría - etiqueta de sección */
    .aviso-categoria {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      padding: 5px 12px;
      background: #1a1a2e;
      color: #f5b042;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    /* Título principal del aviso */
    .aviso-titulo {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 15px 0 20px;
      color: #1a1a2e;
      letter-spacing: -0.5px;
    }

    /* Barra de metadatos */
    .aviso-meta {
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
      padding: 15px 0;
      margin: 15px 0 25px;
      border-top: 1px solid #e8e0d0;
      border-bottom: 1px solid #e8e0d0;
      color: #6b5b4a;
      font-size: 0.8rem;
    }

    .aviso-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Contenido del artículo */
    .aviso-contenido {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #2c3e2f;
      margin: 30px 0;
    }

    .aviso-contenido p {
      margin-bottom: 1.3em;
    }

    /* Recuadro de información adicional */
    .aviso-info-adicional {
      background: #faf8f2;
      border-left: 4px solid #f5b042;
      padding: 18px 24px;
      margin: 30px 0;
      border-radius: 8px;
    }

    .aviso-info-adicional p {
      margin: 10px 0;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Botón volver */
    .boton-volver {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f5f5f0;
      color: #1a1a2e;
      text-decoration: none;
      padding: 10px 22px;
      font-weight: 500;
      font-size: 0.85rem;
      border-radius: 40px;
      transition: all 0.2s ease;
      border: 1px solid #e0d5c0;
    }

    .boton-volver:hover {
      background: #1a1a2e;
      color: #f5b042;
      border-color: #1a1a2e;
    }

    /* Estado de carga */
    .cargando {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .contenedor-chico {
        margin: 15px;
      }
      .aviso-titulo {
        font-size: 1.8rem;
      }
      #aviso-detalle {
        padding: 0 20px 30px;
      }
      .aviso-contenido {
        font-size: 1rem;
      }
      .aviso-meta {
        gap: 15px;
      }
    }
  </style>

  <meta name="theme-color" content="#2c3e50">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <div id="header-container"></div>

  <!-- ================= CONTENIDO ================= -->
  <main class="contenedor-chico">

    <!-- Mensajes del sistema -->
    <div id="mensaje-container"></div>

    <!-- Aquí se inyecta TODO el aviso desde aviso.js -->
    <div id="aviso-detalle" class="cargando">
      📰 Cargando aviso...
    </div>

    <!-- Botón de regreso -->
    <div style="margin-top: 20px; text-align: center; padding-bottom: 30px;">
      <a href="/avisos-jardines/index.html" class="boton-volver">
        ← Volver al inicio
      </a>
    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <div id="footer-container"></div>

  <!-- ================= SCRIPTS ================= -->

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          inicializarHeaderAuth();
        })
        .catch(err => console.error('Error cargando header:', err));
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footer = document.getElementById('footer-container');
          if (footer) {
            footer.innerHTML = data;
            const anio = document.getElementById('anio-actual');
            if (anio) {
              anio.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>

  <!-- Core -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/aviso.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      await UI.cargarHeader();
    });
  </script>

</body>

</html>
