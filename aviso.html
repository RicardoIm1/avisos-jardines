<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">

  <!-- Estilos adicionales estilo periódico SIN SERIFAS -->
  <style>
    /* ========== ESTILO PERIÓDICO MODERNO ========== */
    body {
      background: #f0ece3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Contenedor principal */
    .contenedor-chico {
      max-width: 850px;
      margin: 30px auto;
      background: #ffffff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      padding: 0;
      border-radius: 8px;
    }

    /* Header del periódico */
    .periodico-header {
      text-align: center;
      padding: 20px 20px 15px;
      border-bottom: 3px solid #f5b042;
      margin-bottom: 20px;
      background: #ffffff;
    }

    .periodico-titulo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1a1a2e 0%, #c0392b 50%, #f5b042 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      text-transform: uppercase;
    }

    .periodico-fecha {
      color: #7f8c8d;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    .periodico-edicion {
      font-size: 0.65rem;
      color: #c0392b;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
    }

    /* Contenido del aviso */
    #aviso-detalle {
      padding: 0 30px 30px;
    }

    /* Categoría badge */
    .aviso-categoria {
      display: inline-block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      padding: 4px 10px;
      background: #1a1a2e;
      color: #f5b042;
      margin-bottom: 15px;
    }

    /* Título */
    .aviso-titulo {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      margin: 15px 0;
      color: #1a1a2e;
      border-left: 5px solid #f5b042;
      padding-left: 20px;
    }

    /* Metadatos */
    .aviso-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      padding: 12px 0;
      margin: 15px 0;
      border-top: 1px solid #e8e0d0;
      border-bottom: 1px solid #e8e0d0;
      color: #5d4e37;
      font-size: 0.75rem;
    }

    .aviso-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* Contenido principal */
    .aviso-contenido {
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      margin: 25px 0;
    }

    .aviso-contenido p {
      margin-bottom: 1.2em;
    }

    /* Información adicional */
    .aviso-info-adicional {
      background: #faf7f0;
      border-left: 4px solid #f5b042;
      padding: 15px 20px;
      margin: 25px 0;
    }

    .aviso-info-adicional p {
      margin: 8px 0;
      font-size: 0.9rem;
    }

    /* Botón volver */
    .boton-volver {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a1a2e;
      color: #f5b042;
      text-decoration: none;
      padding: 10px 20px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.75rem;
      border-radius: 30px;
      transition: all 0.2s ease;
    }

    .boton-volver:hover {
      background: #f5b042;
      color: #1a1a2e;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .periodico-titulo {
        font-size: 1.8rem;
      }
      .aviso-titulo {
        font-size: 1.5rem;
        border-left-width: 4px;
        padding-left: 12px;
      }
      #aviso-detalle {
        padding: 0 20px 25px;
      }
      .periodico-header {
        padding: 15px;
      }
    }
  </style>

  <meta name="theme-color" content="#2c3e50">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <div id="header-container"></div>

  <!-- ================= CONTENIDO ================= -->
  <main class="contenedor-chico">

    <!-- Header del periódico -->
    <div class="periodico-header">
      <div class="periodico-edicion">✦ VECINOS INFORMADOS ✦</div>
      <h1 class="periodico-titulo">EL JARDINERO</h1>
      <div class="periodico-fecha">COMUNIDAD • TRANSPARENCIA • UNIÓN</div>
    </div>

    <!-- Mensajes del sistema -->
    <div id="mensaje-container"></div>

    <!-- Aquí se inyecta TODO el aviso desde aviso.js -->
    <div id="aviso-detalle" class="cargando">
      📰 Cargando aviso...
    </div>

    <!-- Botón de regreso -->
    <div style="margin-top: 20px; text-align: center;">
      <a href="/avisos-jardines/index.html" class="boton-volver">
        ← Volver al inicio
      </a>
    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <div id="footer-container"></div>

  <!-- ================= SCRIPTS ================= -->

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/header.html')
        .then(res => {
          if (!res.ok) throw new Error('Header no encontrado');
          return res.text();
        })
        .then(html => {
          document.getElementById('header-container').innerHTML = html;
          inicializarHeaderAuth();
        })
        .catch(err => console.error('Error cargando header:', err));
    });
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footer = document.getElementById('footer-container');
          if (footer) {
            footer.innerHTML = data;
            const anio = document.getElementById('anio-actual');
            if (anio) {
              anio.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>

  <!-- Core -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/ui.js"></script>
  <script src="/avisos-jardines/js/aviso.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      await UI.cargarHeader();
    });
  </script>

</body>

</html>
