<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>Aviso - Avisos Colonia Jardines PVR</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">

  <!-- Meta -->
  <meta name="theme-color" content="#2c3e50">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header">
    <div class="contenedor">
      <h1>Avisos Colonia Jardines PVR</h1>
      <h4>El canal oficial donde los vecinos sí ven las cosas</h4>

      <div>
        <a href="/avisos-jardines/login.html" id="login-link">Iniciar sesión</a>
      </div>
    </div>
  </header>

  <!-- ================= CONTENIDO ================= -->
  <main class="contenedor-chico">

    <!-- Mensajes del sistema -->
    <div id="mensaje-container"></div>

    <!-- Aquí se inyecta TODO el aviso desde aviso.js -->
    <div id="aviso-detalle" class="cargando">
      Cargando aviso...
    </div>

    <!-- Botón de regreso -->
    <div style="margin-top: 24px;">
      <a href="/avisos-jardines/index.html" class="boton boton-chico">
        ← Volver a avisos
      </a>
    </div>

  </main>

  <!-- ================= FOOTER ================= -->
  <div id="footer-container"></div>

  <!-- ================= SCRIPTS ================= -->

  <script>
    // 🔽 Cargar footer dinámico
    document.addEventListener('DOMContentLoaded', function () {
      fetch('/avisos-jardines/common/footer.html')
        .then(response => {
          if (!response.ok) throw new Error('Footer no encontrado');
          return response.text();
        })
        .then(data => {
          const footer = document.getElementById('footer-container');
          if (footer) {
            footer.innerHTML = data;

            const anio = document.getElementById('anio-actual');
            if (anio) {
              anio.textContent = new Date().getFullYear();
            }
          }
        })
        .catch(error => console.error('Error cargando el footer:', error));
    });
  </script>

  <!-- Core -->
  <script src="/avisos-jardines/js/api.js"></script>
  <script src="/avisos-jardines/js/auth.js"></script>

  <!-- Lógica del detalle -->
  <script src="/avisos-jardines/js/aviso.js"></script>

</body>
</html>
