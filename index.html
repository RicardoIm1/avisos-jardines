<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Avisos Jardines</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .aviso { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .titulo { font-weight: bold; }
    .fecha { color: gray; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>Avisos de la Colonia Jardines</h1>
  <div id="avisos"></div>

  <script>
    // URL de tu WebApp publicado en Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbzfHel-cMAp4tSyDt_a1w8HZ8G0u5yI4aEf6S32rVW8U2VqFYWY25jDQNuC0pU8SVTHWg/exec";

    async function cargarAvisos() {
      try {
        const res = await fetch(`${API_URL}?action=read`);
        const avisos = await res.json();

        const contenedor = document.getElementById("avisos");
        contenedor.innerHTML = "";

        avisos.forEach(aviso => {
          const div = document.createElement("div");
          div.className = "aviso";
          div.innerHTML = `
            <div class="titulo">${aviso.Titulo}</div>
            <div class="descripcion">${aviso.Descripcion}</div>
            <div class="fecha">${new Date(aviso.Fecha).toLocaleString()}</div>
            <div class="autor">Por: ${aviso.Autor}</div>
          `;
          contenedor.appendChild(div);
        });
      } catch (err) {
        console.error("Error cargando avisos", err);
      }
    }

    cargarAvisos();
  </script>
</body>
</html>
