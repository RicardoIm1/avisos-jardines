<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>Avisos Jardines</title>
    <link rel="stylesheet" href="/avisos-jardines/css/estilo.css">
    <link rel="manifest" href="/avisos-jardines/manifest.json">
    <meta name="theme-color" content="#2c3e50">
</head>

<body>
    <header class="header">
        <div class="contenedor">
            <h1>Avisos Jardines</h1>
            <div>
                <a href="/avisos-jardines/login.html">Admin</a>
            </div>
        </div>
    </header>

    <main class="contenedor">
        <h2>📢 Avisos Públicos</h2>
        <div id="avisos-container"></div>
    </main>

    <script>
        async function cargarAvisosPublicos() {
            const contenedor = document.getElementById('avisos-container');
            contenedor.innerHTML = '<div class="cargando">Cargando avisos...</div>';

            try {
                // 👉 Reemplaza con la URL publicada de tu hoja AVISOS
                const url = "https://docs.google.com/spreadsheets/d/e/TU_ID/pub?output=csv";
                const resp = await fetch(url);
                const texto = await resp.text();

                // Parsear CSV
                const filas = texto.split("\n").map(f => f.split(","));
                const encabezados = filas[0];
                const datos = filas.slice(1).map(fila => {
                    let obj = {};
                    encabezados.forEach((h, i) => obj[h.trim()] = fila[i] ? fila[i].trim() : "");
                    return obj;
                });

                if (datos.length === 0) {
                    contenedor.innerHTML = '<div class="mensaje mensaje-info">📭 No hay avisos publicados</div>';
                } else {
                    contenedor.innerHTML = datos.map(aviso => crearTarjetaAviso(aviso)).join('');
                }
            } catch (error) {
                console.error("Error cargando avisos públicos:", error);
                contenedor.innerHTML = '<div class="mensaje mensaje-error">❌ Error al cargar avisos públicos</div>';
            }
        }

        function crearTarjetaAviso(aviso) {
            return `
        <div class="tarjeta-aviso">
          <h3>${aviso.titulo || "Aviso sin título"}</h3>
          <p>${aviso.contenido || ""}</p>
          <div class="meta">
            ${aviso.ubicacion ? "📍 " + aviso.ubicacion : ""}
            ${aviso.created_at ? "📅 " + aviso.created_at : ""}
          </div>
        </div>
      `;
        }

        cargarAvisosPublicos();
    </script>
</body>

</html>
